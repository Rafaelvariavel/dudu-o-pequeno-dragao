<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Página simples do livro infantil digital 'Dudu, o Pequeno Dragão'.">
  <meta name="theme-color" content="#111111">
  <meta property="og:title" content="Dudu, o Pequeno Dragão">
  <meta property="og:description" content="Livro infantil digital com download direto.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/cover.png">
  <title>Dudu, o Pequeno Dragão</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    :root{
      --bg:#f5f5f5;
      --card:#ffffff;
      --text:#111111;
      --muted:#666666;
      --line:#dddddd;
      --shadow:0 20px 50px rgba(0,0,0,.08);
      --radius:28px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:linear-gradient(180deg,#ffffff 0%, #f5f5f5 100%);
      color:var(--text);
      line-height:1.5;
    }
    .wrap{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
    }
    .card{
      width:min(920px,100%);
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:clamp(20px,4vw,40px);
    }
    .layout{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:32px;
      align-items:center;
    }
    .cover{
      width:100%;
      max-width:420px;
      margin:0 auto;
    }
    .cover img{
      width:100%;
      display:block;
      aspect-ratio:1/1;
      object-fit:cover;
      border-radius:24px;
      border:1px solid var(--line);
      background:#f0f0f0;
    }
    .content{
      text-align:left;
    }
    h1{
      margin:0 0 10px;
      font-size:clamp(2rem,5vw,4rem);
      line-height:1.05;
      letter-spacing:-.03em;
    }
    .author{
      font-size:1.1rem;
      margin:0 0 18px;
      color:var(--muted);
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:14px 20px;
      border-radius:16px;
      text-decoration:none;
      font-weight:700;
      border:1px solid #111111;
      background:#111111;
      color:#ffffff;
      transition:transform .2s ease, opacity .2s ease;
    }
    .btn:hover{transform:translateY(-1px);opacity:.95}
    .credits{
      margin-top:22px;
      padding-top:18px;
      border-top:1px solid var(--line);
      color:var(--muted);
      font-size:.95rem;
    }
    .credits strong{color:var(--text)}
    .fine{
      margin-top:8px;
      color:#7a7a7a;
      font-size:.88rem;
    }
    @media (max-width: 780px){
      .layout{grid-template-columns:1fr;gap:22px}
      .content{text-align:center}
      .btn{width:100%}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card" aria-label="Página do livro">
      <div class="layout">
        <div class="cover">
          <img src="assets/cover.png" alt="Capa do livro Dudu, o Pequeno Dragão">
        </div>

        <div class="content">
          <h1>Dudu, o Pequeno Dragão</h1>
          <p class="author">Autor: Rafael Vieira Dantas</p>
          <a class="btn" href="assets/Dudu_O_Pequeno_Dragao.pdf" download>Baixar o livro</a>

          <div class="credits">
            <strong>Créditos</strong><br>
            Capa, texto e edição: Rafael Vieira Dantas
            <div class="fine">Layout limpo em preto e branco, sem distrações.</div>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
