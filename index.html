<!-- DOAÇÃO -->
<div class="donation">
  <h2>💝 Apoie o Autor</h2>
  <p>
    Se você gostou da história, considere fazer uma doação para ajudar
    na criação de novos livros infantis.
  </p>

  <img src="assets/qr_code.png" alt="QR Code para doação" class="qr">

  <p class="small">
    Escaneie o QR Code usando o aplicativo do seu banco.
  </p>
</div>

<!-- FEEDBACK -->
<div class="feedback">
  <h2>⭐ Avaliações Públicas</h2>

  <div class="stars">
    <button onclick="setRating(1)">★</button>
    <button onclick="setRating(2)">★</button>
    <button onclick="setRating(3)">★</button>
    <button onclick="setRating(4)">★</button>
    <button onclick="setRating(5)">★</button>
  </div>

  <form id="commentForm">
    <input
      type="text"
      id="name"
      placeholder="Seu nome"
      required
    >

    <textarea
      id="comment"
      placeholder="O que você achou do livro?"
      required
    ></textarea>

    <button type="submit" class="btn">
      Publicar Avaliação
    </button>
  </form>

  <div id="comments"></div>
</div>
